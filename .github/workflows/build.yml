name: Build HalalCraft
on:
  push:
    branches: [ "main" ] # Bạn có thể giới hạn build tự động ở đây nếu muốn
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Thêm dòng này để bật tính năng build thủ công trên giao diện

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
      - name: Permission
        run: chmod +x gradlew
      - name: Build with Gradle
        run: ./gradlew build
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: HalalCraft-Jar
          path: build/libs/*.jar
